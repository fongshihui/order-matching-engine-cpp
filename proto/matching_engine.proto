syntax = "proto3";

package matchingengine;

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
}

enum ReportCommand {
  REPORT_COMMAND_UNSPECIFIED = 0;
  REPORT_COMMAND_NEW_LIMIT = 1;
  REPORT_COMMAND_NEW_MARKET = 2;
  REPORT_COMMAND_CANCEL = 3;
  REPORT_COMMAND_MODIFY = 4;
  REPORT_COMMAND_UNKNOWN = 5;
}

message Empty {}

message Flags {
  bool ioc = 1;
  bool fok = 2;
  bool post_only = 3;
  bool stp = 4;
}

message NewOrderRequest {
  uint64 order_id = 1;
  uint64 user_id = 2;
  Side side = 3;
  OrderType type = 4;
  optional int64 price = 5;
  uint64 qty = 6;
  Flags flags = 7;
}

message CancelRequest {
  uint64 order_id = 1;
  uint64 user_id = 2;
}

message ModifyRequest {
  uint64 order_id = 1;
  optional int64 price = 2;
  optional uint64 qty = 3;
}

message ProcessRequest {
  oneof command {
    NewOrderRequest new_order = 1;
    CancelRequest cancel = 2;
    ModifyRequest modify = 3;
  }
}

message Fill {
  uint64 maker_order_id = 1;
  uint64 maker_user_id = 2;
  uint64 taker_order_id = 3;
  uint64 taker_user_id = 4;
  Side side = 5;
  int64 price = 6;
  uint64 qty = 7;
}

message ExecutionReport {
  ReportCommand command = 1;
  uint64 order_id = 2;
  bool rejected = 3;
  string reject_reason = 4;
  string reject_message = 5;
  bool canceled = 6;
  repeated Fill fills = 7;
  uint64 filled_qty = 8;
}

message PriceResponse {
  optional int64 price = 1;
}

message DepthLevel {
  int64 price = 1;
  uint64 qty = 2;
}

message DepthRequest {
  Side side = 1;
}

message DepthResponse {
  repeated DepthLevel levels = 1;
}

message ErrorResponse {
  string message = 1;
}

message RequestEnvelope {
  oneof payload {
    ProcessRequest process = 1;
    Empty best_bid = 2;
    Empty best_ask = 3;
    DepthRequest depth = 4;
    Empty quit = 5;
  }
}

message ResponseEnvelope {
  oneof payload {
    ExecutionReport report = 1;
    PriceResponse best_bid = 2;
    PriceResponse best_ask = 3;
    DepthResponse depth = 4;
    ErrorResponse error = 5;
    Empty quit = 6;
  }
}
